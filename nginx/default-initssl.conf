# HTTP-only config used during initial SSL certificate request.
# This file is used temporarily by init-letsencrypt.sh.
# After certificates are obtained, nginx switches to default.conf (full SSL).

server {
    listen 80;
    server_name dev.strattonhealth.com strattonhealth.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'SSL setup in progress...';
        add_header Content-Type text/plain;
    }
}
